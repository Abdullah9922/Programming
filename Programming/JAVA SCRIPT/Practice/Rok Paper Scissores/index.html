<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissores Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissores Game</h1>

    <div class="choices">

        <div class="choice" id="rock">
            <img src="img/rock.png" alt="Image of Rock">
        </div>

        <div class="choice" id="paper">
            <img src="img/paper.png" alt="Image of paper">
        </div>

        <div class="choice" id ="scissors">
            <img src="img/scissors.png" alt="Image of scissor">
        </div>
    </div>



    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p id="user-score2">You</p>
        </div>

        <div class="socre">
            <p id="comp-score">0</p>
            <p id="comp-score2">Comp</p>
        </div>
    </div>

    
    <div class="msg-container">
        <div id="msg">
            <p>Play your move</p>
        </div>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
