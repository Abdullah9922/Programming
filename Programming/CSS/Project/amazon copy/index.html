<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <header>
        <div class="navbar">

            <!-- Amazon Logo -->
            <div class="nav-logo border">

                <div class="logo"></div>

            </div>

            <!-- Address -->
            <div class="nav-address border">
                <p id="add1">Deliver to</p>
                <div class="add-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p id="add2">Bangladesh</p>
                </div>
            </div>

            <!-- Box 3, Search Bar -->
            <div class="nav-search">

                <select id="search-seclect">
                    <option>All</option>
                </select>

                <input type="text" placeholder="Search Amazon" id="search-input">

                <div id="search-icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>

            </div>

            <!-- Box 4, Sign in -->
            <div class="nav-sign border">
                <p class="sign1">Hello, Sign in</p>
                <p class="sign2" class="nav-second">Account & Lists</p>
            </div>

            <!-- Box 5, Returns & Orders -->
            <div class="nav-sign border">
                <p class="sign1">Returns</p>
                <p class="sign2" class="nav-second">& Orders</p>
            </div>


            <!-- Box 6, Cart -->
            <div class="nav-cart border">
                <i class="fa-solid fa-cart-shopping"></i>
                <p id="cart">Cart</p>
            </div>


        </div>

    </header>
</body>

</html>
