<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 2</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">

        <div class="page">

            <h1>Job Application
                <span class="web">(Web)</span>
            </h1>





            <form>
                <div class="form-container">


                    <div class="form-control">

                        <label for="f-name">First Name</label>
                        <input id="f-name" name="first-name" placeholder="Enter First Name...">


                        <label for="l-name">Last Name</label>
                        <input id="l-name" name="last-name" placeholder="Enter Last Name...">


                        <label for="email">Email</label>
                        <input id="email" type="email" name="email" placeholder="Enter Your Email...">


                        <label for="job-role">Job Role</label>
                        <select id="job-role" name="job-role">
                            <option value="frontend">Frontend Devoloper</option>
                            <option value="backend">Backend Devoloper</option>
                            <option value="full-stack">Full Stack Devoloper</option>
                            <option value="ui-ux">UI UX Designer</option>
                        </select>


                        <label for="address">Address</label>
                        <textarea id="address" row="4" cols="50" name="address" placeholder="Enter Your Address...">
                    </textarea>


                        <label for="city">City</label>
                        <input id="city" name="city" placeholder="Enter Your City Name...">


                        <label for="pin">Pincode</label>
                        <input id="pin" type="number" name="pic" placeholder="Enter Your Pin Code...">


                        <label for="date">Date</label>
                        <input id="date" type="date" name="date" value="2026-01-10">


                        <label for="upload">Upload Your CV</label>
                        <input id="upload" type="file" name="upload">


                    </div>

                </div>
        </div>

        <button type="submit">Apply Now</button>
        </form>


    </div>



</body>

</html>
